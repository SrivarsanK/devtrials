version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: RideSuraksha-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=RideSuraksha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: RideSuraksha-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: RideSuraksha-backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/RideSuraksha
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  ml-suite:
    build:
      context: ./backend/Dev_ML_Model
      dockerfile: Dockerfile
    container_name: RideSuraksha-ml
    ports:
      - "9000:9000"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
