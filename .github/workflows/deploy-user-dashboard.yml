name: Deploy User Dashboard (user-dashboard)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/user-dashboard/**'
      - '.github/workflows/deploy-user-dashboard.yml'

env:
  VERCEL_ORG_ID: "team_HQYju4x16UyFTQs4D94J2OdT"
  VERCEL_PROJECT_ID: "prj_jhw3eH7AaHCxKBqIi6ImJqVDxajn"

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/user-dashboard
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/user-dashboard
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/user-dashboard
